<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cone 3D - Planificação Real</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body, html { 
            width: 100%;
            height: 100%;
            background-color: #121214; 
            color: #ffffff; 
            overflow: hidden; 
            position: relative;
        }

        #canvas-container { 
            width: 100%; 
            height: 100%; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #painel-controle { 
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background-color: rgba(26, 26, 30, 0.85); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(63, 63, 70, 0.5); 
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .texto-painel {
            text-align: center;
        }

        h2 { 
            font-size: 1.4rem; 
            margin-bottom: 4px; 
            color: #a1a1aa; 
        }

        p { 
            font-size: 0.85rem; 
            color: #71717a; 
            line-height: 1.4; 
        }

        .slider-box { 
            width: 100%;
            background: rgba(44, 44, 48, 0.5); 
            padding: 15px 20px; 
            border-radius: 8px; 
            border: 1px solid rgba(63, 63, 70, 0.3); 
        }

        label { 
            display: block; 
            font-size: 0.85rem;
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #a1a1aa; 
            text-align: center;
        }

        input[type="range"] { 
            width: 100%; 
            accent-color: #a1a1aa; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="painel-controle">
        <div class="texto-painel">
            <h2>Planificação Dinâmica</h2>
            <p>Arraste o controle para ver o cone se abrindo e deitando no chão.</p>
        </div>
        
        <div class="slider-box">
            <label for="fator-abertura">Abrir e Deitar Cone</label>
            <input type="range" id="fator-abertura" min="0" max="1" step="0.001" value="0" oninput="atualizarPlanificacao(this.value)">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let geoLateral, malhaLateral, malhaBase;
        
        // Dimensões estáveis do cone
        const raio = 1.5;
        const altura = 3.5;
        const g = Math.sqrt(raio * raio + altura * altura); // Geratriz
        const anguloSetorMax = (2 * Math.PI * raio) / g; // Setor circular plano
        
        const segmentos = 64;

        initThree();

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x121214);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, altura / 3, 0);

            // Luzes reforçadas para garantir visibilidade total de ambos os lados
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const luzDirecional1 = new THREE.DirectionalLight(0xffffff, 0.7);
            luzDirecional1.position.set(5, 10, 5);
            scene.add(luzDirecional1);
            
            const luzDirecional2 = new THREE.DirectionalLight(0xffffff, 0.3);
            luzDirecional2.position.set(-5, -5, -5);
            scene.add(luzDirecional2);
            
            // Grade no chão
            scene.add(new THREE.GridHelper(20, 20, 0x3f3f46, 0x222225));

            construirCone();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function construirCone() {
            // Criando a geometria manual da superfície lateral por meio de triângulos indexados (Leque)
            geoLateral = new THREE.BufferGeometry();
            
            // Vértices necessários: 1 para o topo + pontos da base
            const verticesLista = [];
            const indicesLista = [];

            // Ponto 0: Vértice do topo do cone (Vértice principal)
            verticesLista.push(0, altura, 0);

            // Pontos da base ao redor do perímetro
            for (let i = 0; i <= segmentos; i++) {
                const angulo = (i / segmentos) * Math.PI * 2;
                const x = Math.cos(angulo) * raio;
                const z = Math.sin(angulo) * raio;
                verticesLista.push(x, 0, z);

                if (i < segmentos) {
                    indicesLista.push(0, i + 1, i + 2);
                }
            }

            geoLateral.setAttribute('position', new THREE.Float32BufferAttribute(verticesLista, 3));
            geoLateral.setIndex(indicesLista);

            const matLateral = new THREE.MeshStandardMaterial({ 
                color: 0x8e8e93, 
                side: THREE.DoubleSide,
                roughness: 0.4,
                metalness: 0.1
            });

            malhaLateral = new THREE.Mesh(geoLateral, matLateral);
            scene.add(malhaLateral);

            // Base circular do cone
            const geoBase = new THREE.CircleGeometry(raio, segmentos);
            const matBase = new THREE.MeshStandardMaterial({
                color: 0x48484a,
                side: THREE.DoubleSide,
                roughness: 0.5
            });
            malhaBase = new THREE.Mesh(geoBase, matBase);
            malhaBase.rotateX(-Math.PI / 2); // Deita a base no chão
            scene.add(malhaBase);

            atualizarPlanificacao(0);
        }

        function atualizarPlanificacao(valor) {
            const t = parseFloat(valor);
            const posicoes = geoLateral.attributes.position.array;

            // 1. ANIMAÇÃO DA SUPERFÍCIE LATERAL
            // O ângulo do arco abre progressivamente de 2*PI até o anguloSetorMax
            const anguloAtual = THREE.MathUtils.lerp(Math.PI * 2, anguloSetorMax, t);
            
            // A altura do topo cai até zero
            const alturaAtual = THREE.MathUtils.lerp(altura, 0, t);

            // Na planificação real, o raio do leque plano é SEMPRE a geratriz (g).
            // Para manter a integridade física do cone sem esticar o papel, usamos g como base.
            const raioMapeamento = g; 

            // Atualiza o vértice do topo (Índice 0)
            posicoes[0] = 0;
            posicoes[1] = alturaAtual;
            // O topo se desloca para trás para compensar o plano de rotação
            posicoes[2] = THREE.MathUtils.lerp(0, -g + raio, t);

            // Atualiza os pontos da borda curva (antiga base)
            for (let i = 0; i <= segmentos; i++) {
                const percentual = i / segmentos;
                const phi = (percentual - 0.5) * anguloAtual; 

                const idx = (i + 1) * 3;

                if (t === 0) {
                    // Posição estática inicial perfeita
                    const anguloOriginal = percentual * Math.PI * 2;
                    posicoes[idx] = Math.cos(anguloOriginal) * raio;
                    posicoes[idx + 1] = 0;
                    posicoes[idx + 2] = Math.sin(anguloOriginal) * raio;
                } else {
                    // Interpolação linear da rotação tridimensional para o plano 2D
                    const xPlano = Math.sin(phi) * raioMapeamento;
                    const zPlano = Math.cos(phi) * raioMapeamento - g + raio;

                    const anguloOriginal = percentual * Math.PI * 2;
                    const xCone = Math.cos(anguloOriginal) * raio;
                    const zCone = Math.sin(anguloOriginal) * raio;

                    // Transição suave sem deformação de escala
                    posicoes[idx] = THREE.MathUtils.lerp(xCone, xPlano, t);
                    posicoes[idx + 1] = THREE.MathUtils.lerp(0, 0.001, t); // Evita z-fighting com o grid
                    posicoes[idx + 2] = THREE.MathUtils.lerp(zCone, zPlano, t);
                }
            }

            geoLateral.attributes.position.needsUpdate = true;
            geoLateral.computeVertexNormals();

            // 2. ANIMAÇÃO DA TAMPA DA BASE
            if (t === 0) {
                malhaBase.position.set(0, 0, 0);
            } else {
                // A base se conecta exatamente no ponto central da borda do setor circular (onde phi = 0)
                const zConexao = raioMapeamento - g + raio; 
                malhaBase.position.set(0, 0.005, THREE.MathUtils.lerp(0, zConexao + raio, t));
            }
        }

        function onWindowResize() { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        }
        
        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            renderer.render(scene, camera); 
        }
    </script>
</body>
</html>
