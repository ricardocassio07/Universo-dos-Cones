<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cone Equilátero - Corte Vertical</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body, html { width: 100%; height: 100%; background-color: #0c0c0e; color: #ffffff; overflow: hidden; }
        .visualizador-master { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        #canvas-container { width: 100%; height: 100%; }

        .painel-info {
            position: absolute; top: 180px; right: 30px; width: 360px; /* Alterado para right */
            background: rgba(20, 20, 25, 0.85); border: 1px solid #3f3f46;
            border-radius: 16px; padding: 25px; backdrop-filter: blur(12px); z-index: 10;
        }
        h1 { color: #00ff88; margin-bottom: 10px; }
        .formula { font-family: 'Courier New', monospace; font-size: 1.4rem; color: #ff9d00; margin: 15px 0; }
        p { font-size: 0.9rem; color: #d4d4d8; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="painel-info">
        <h1>Cone Equilátero</h1>
        <p>A seção meridiana é obtida pelo corte vertical que passa pelo vértice e pelo centro da base.</p>
        <div class="formula">g = 2r</div>
        <p>No cone equilátero, esse corte revela um <strong>triângulo equilátero</strong> de lado igual à geratriz.</p>
    </div>

    <div class="visualizador-master">
        <div id="canvas-container"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0c0c0e);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(6, 4, 8);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            // Adicionando a malha quadriculada (Grid)
            const grid = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
            scene.add(grid);

            // Cone
            const r = 1.5;
            const h = r * Math.sqrt(3);
            const geometry = new THREE.ConeGeometry(r, h, 64);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x00a2ff, transparent: true, opacity: 0.4, side: THREE.DoubleSide 
            });
            const cone = new THREE.Mesh(geometry, material);
            cone.position.y = h/2;
            scene.add(cone);

            // Plano de corte vertical (YZ)
            const planeGeo = new THREE.PlaneGeometry(r * 3, h * 1.2);
            const planeMat = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, transparent: true, opacity: 0.2, side: THREE.DoubleSide 
            });
            const plane = new THREE.Mesh(planeGeo, planeMat);
            plane.position.y = h/2;
            scene.add(plane);

            // Borda do corte (Triângulo Equilátero)
            const pts = [
                new THREE.Vector3(0, h, 0),    // Topo
                new THREE.Vector3(r, 0, 0),    // Base direita
                new THREE.Vector3(-r, 0, 0),   // Base esquerda
                new THREE.Vector3(0, h, 0)     // Fechar
            ];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
            const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0x00ff88, linewidth: 2 }));
            scene.add(line);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
