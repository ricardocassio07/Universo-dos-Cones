<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cone 3D - Elementos Geométricos</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body, html { 
            width: 100%;
            height: 100%;
            background-color: #121214; 
            color: #ffffff; 
            overflow: hidden; 
            position: relative;
        }

        #canvas-container { 
            width: 100%; 
            height: 100%; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #painel-controle { 
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 800px;
            background-color: rgba(26, 26, 30, 0.9); 
            padding: 22px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(63, 63, 70, 0.5); 
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
            backdrop-filter: blur(16px);
            z-index: 10;
        }

        .texto-painel {
            text-align: center;
            width: 100%;
        }

        h2 { 
            font-size: 1.4rem; 
            margin-bottom: 6px; 
            color: #00ff88; 
            transition: color 0.3s ease;
        }

        #info-elemento {
            font-size: 0.9rem; 
            color: #d4d4d8; 
            line-height: 1.5;
            min-height: 40px;
            max-width: 650px;
            margin: 0 auto;
        }

        .botoes-foco { 
            display: flex; 
            flex-direction: row; 
            justify-content: center;
            gap: 12px; 
            width: 100%;
        }

        .btn-foco { 
            background-color: #2c2c30; 
            color: #ffffff; 
            border: 1px solid #3f3f46; 
            padding: 12px 18px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }

        .btn-foco:hover { 
            background-color: #3f3f46; 
            transform: translateY(-2px); 
        }

        .btn-geratriz:hover, .btn-geratriz.ativo { border-color: #ff3366; box-shadow: 0 0 10px rgba(255,51,102,0.2); }
        .btn-raio:hover, .btn-raio.ativo { border-color: #3399ff; box-shadow: 0 0 10px rgba(51,153,255,0.2); }
        .btn-altura:hover, .btn-altura.ativo { border-color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.2); }

        .btn-foco[data-tipo="geratriz"]::after { content: "(g)"; color: #ff3366; font-weight: bold; }
        .btn-foco[data-tipo="raio"]::after { content: "(r)"; color: #3399ff; font-weight: bold; }
        .btn-foco[data-tipo="altura"]::after { content: "(h)"; color: #00ff88; font-weight: bold; }

        .instrucao-reset { 
            font-size: 0.75rem; 
            color: #71717a; 
            text-align: center; 
            margin-top: -5px;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="painel-controle">
        <div class="texto-painel">
            <h2 id="titulo-painel">Elementos do Cone</h2>
            <p id="info-elemento">Selecione um dos componentes geométricos abaixo para isolar suas propriedades e analisar sua aplicação no triângulo retângulo interno (Teorema de Pitágoras).</p>
        </div>
        
        <div class="botoes-foco">
            <button onclick="focarElemento('geratriz')" class="btn-foco btn-geratriz" data-tipo="geratriz">Geratriz</button>
            <button onclick="focarElemento('raio')" class="btn-foco btn-raio" data-tipo="raio">Raio da Base</button>
            <button onclick="focarElemento('altura')" class="btn-foco btn-altura" data-tipo="altura">Altura</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let coneMesh, linhaGeratriz, linhaRaio, linhaAltura;
        let verticePonto, indicadorAngulo, grupoRotulos = new THREE.Group();
        
        const raioCone = 2, alturaCone = 4;
        const coresOriginais = { geratriz: 0xff3366, raio: 0x3399ff, altura: 0x00ff88, vertice: 0xa855f7 };

        const bancoDadosInfo = {
            geratriz: {
                titulo: "Geratriz (g)",
                cor: "#ff3366",
                texto: "A geratriz é o segmento que une o vértice do cone a qualquer ponto da circunferência da base. No cone reto, funciona como a <strong>hipotenusa</strong> do triângulo retângulo interno."
            },
            raio: {
                titulo: "Raio da Base (r)",
                cor: "#3399ff",
                texto: "O raio é a distância entre o centro da base circular e sua extremidade. Ele define a área de suporte do cone ($A = \\pi r^2$) e atua como um dos <strong>catetos</strong> do triângulo interno."
            },
            altura: {
                titulo: "Altura (h)",
                cor: "#00ff88",
                texto: "A altura é o segmento perpendicular que conecta o vértice do cone ao centro da base. Mede a distância vertical exata do sólido e atua como o segundo <strong>cateto</strong> da estrutura."
            },
            padrao: {
                titulo: "Elementos do Cone",
                cor: "#00ff88",
                texto: "Selecione um dos componentes geométricos abaixo para isolar suas propriedades e analisar sua aplicação no triângulo retângulo interno (Teorema de Pitágoras)."
            }
        };

        initThree();

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x121214);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(6, 4, 7);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.target.set(0, alturaCone / 2, 0);
            controls.maxPolarAngle = Math.PI / 2 + 0.1;

            scene.add(new THREE.AmbientLight(0xffffff, 0.65));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.55);
            dirLight.position.set(6, 12, 8);
            scene.add(dirLight);

            scene.add(new THREE.GridHelper(20, 20, 0x3f3f46, 0x222225));
            scene.add(grupoRotulos);

            construirCenario();
            window.addEventListener('resize', onWindowResize);
            
            renderer.domElement.addEventListener('click', (e) => {
                // Só reseta se clicar puramente no fundo do canvas
                if(e.target === renderer.domElement) restaurarCenaPadrao();
            });

            animate();
        }

        function construirCenario() {
            // 1. O CONE TRASLÚCIDO
            const coneGeo = new THREE.ConeGeometry(raioCone, alturaCone, 48, 1, true); // Aberto embaixo para ver o interior
            coneMesh = new THREE.Mesh(coneGeo, new THREE.MeshPhongMaterial({ 
                color: 0x27272a, 
                transparent: true, 
                opacity: 0.25, 
                side: THREE.DoubleSide,
                wireframe: false
            }));
            coneMesh.position.y = alturaCone / 2;
            scene.add(coneMesh);

            // Borda da base para dar volume
            const bordaGeo = new THREE.RingGeometry(raioCone - 0.02, raioCone, 48);
            const bordaMesh = new THREE.Mesh(bordaGeo, new THREE.MeshBasicMaterial({ color: 0x3f3f46, side: THREE.DoubleSide }));
            bordaMesh.rotation.x = Math.PI / 2;
            scene.add(bordaMesh);

            // 2. VETORES E ELEMENTOS LINEARES
            linhaAltura = criarLinha([new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, alturaCone, 0)], coresOriginais.altura);
            linhaRaio = criarLinha([new THREE.Vector3(0, 0, 0), new THREE.Vector3(raioCone, 0, 0)], coresOriginais.raio);
            linhaGeratriz = criarLinha([new THREE.Vector3(raioCone, 0, 0), new THREE.Vector3(0, alturaCone, 0)], coresOriginais.geratriz);

            // 3. MARCAÇÃO DO VÉRTICE (PONTO SUPERIOR)
            const verticeGeo = new THREE.SphereGeometry(0.09, 16, 16);
            const verticeMat = new THREE.MeshBasicMaterial({ color: coresOriginais.vertice });
            verticePonto = new THREE.Mesh(verticeGeo, verticeMat);
            verticePonto.position.set(0, alturaCone, 0);
            scene.add(verticePonto);

            // 4. INDICADOR DE ÂNGULO RETO (90 GRAUS)
            const tamQuadrado = 0.3;
            const ptsAngulo = [
                new THREE.Vector3(0, tamQuadrado, 0),
                new THREE.Vector3(tamQuadrado, tamQuadrado, 0),
                new THREE.Vector3(tamQuadrado, 0, 0)
            ];
            const geoAngulo = new THREE.BufferGeometry().setFromPoints(ptsAngulo);
            indicadorAngulo = new THREE.Line(geoAngulo, new THREE.LineBasicMaterial({ color: 0xffff55, linewidth: 2 }));
            scene.add(indicadorAngulo);

            // Ponto central do indicador de 90°
            const pontoAnguloGeo = new THREE.SphereGeometry(0.03, 8, 8);
            const pontoAnguloMesh = new THREE.Mesh(pontoAnguloGeo, new THREE.MeshBasicMaterial({ color: 0xffff55 }));
            pontoAnguloMesh.position.set(tamQuadrado/2, tamQuadrado/2, 0);
            scene.add(pontoAnguloMesh);

            // 5. RÓTULOS IDENTIFICADORES EM 3D
            criarRotulo3D("h", new THREE.Vector3(-0.25, alturaCone / 2, 0), coresOriginais.altura);
            criarRotulo3D("r", new THREE.Vector3(raioCone / 2, -0.25, 0), coresOriginais.raio);
            criarRotulo3D("g", new THREE.Vector3(raioCone / 2 + 0.25, alturaCone / 2 + 0.1, 0), coresOriginais.geratriz);
            criarRotulo3D("Vértice", new THREE.Vector3(0, alturaCone + 0.3, 0), coresOriginais.vertice, true);
        }

        function criarLinha(pontos, cor) {
            const geo = new THREE.BufferGeometry().setFromPoints(pontos);
            const mat = new THREE.LineBasicMaterial({ color: cor, linewidth: 4, transparent: true, opacity: 1 });
            const linha = new THREE.Line(geo, mat);
            scene.add(linha);
            return linha;
        }

        // Gera cubos/esferas estilizadas flutuantes que funcionam como identificadores visuais fixos
        function criarRotulo3D(texto, posicao, cor, ehVertice = false) {
            let meshIndicadora;
            if (ehVertice) {
                meshIndicadora = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.15, 4), new THREE.MeshBasicMaterial({ color: cor }));
                meshIndicadora.rotation.x = Math.PI;
            } else {
                meshIndicadora = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.08), new THREE.MeshBasicMaterial({ color: cor }));
            }
            meshIndicadora.position.copy(posicao);
            grupoRotulos.add(meshIndicadora);
        }

        function focarElemento(tipo) {
            let posCam, posTarget;
            
            // Gerencia classes visuais nos botões
            document.querySelectorAll('.btn-foco').forEach(b => b.classList.remove('ativo'));
            document.querySelector(`.btn-${tipo}`).classList.add('ativo');

            // Apaga suavemente todos os elementos para dar destaque ao alvo
            [linhaGeratriz, linhaRaio, linhaAltura].forEach(l => l.material.opacity = 0.15);
            grupoRotulos.children.forEach(m => m.material.opacity = 0.2);
            indicadorAngulo.material.opacity = 0.1;
            verticePonto.material.opacity = 0.2;
            coneMesh.material.opacity = 0.05;

            // Atualiza conteúdo de texto no painel dinamicamente
            const dados = bancoDadosInfo[tipo];
            document.getElementById('titulo-painel').innerText = dados.titulo;
            document.getElementById('titulo-painel').style.color = dados.cor;
            document.getElementById('info-elemento').innerHTML = dados.texto;

            // Define foco geométrico de câmera
            if (tipo === 'geratriz') {
                linhaGeratriz.material.opacity = 1.0;
                grupoRotulos.children[2].material.opacity = 1.0; // Ativa rótulo 'g'
                posCam = { x: 4.5, y: 2.2, z: 4.5 }; 
                posTarget = { x: raioCone / 2, y: alturaCone / 2, z: 0 };
            } else if (tipo === 'raio') {
                linhaRaio.material.opacity = 1.0;
                grupoRotulos.children[1].material.opacity = 1.0; // Ativa rótulo 'r'
                indicadorAngulo.material.opacity = 1.0;
                posCam = { x: 0, y: 2.5, z: 5.5 }; 
                posTarget = { x: raioCone / 2, y: 0, z: 0 };
            } else if (tipo === 'altura') {
                linhaAltura.material.opacity = 1.0;
                grupoRotulos.children[0].material.opacity = 1.0; // Ativa rótulo 'h'
                indicadorAngulo.material.opacity = 1.0;
                posCam = { x: 4.5, y: alturaCone / 2 + 1, z: 3.5 }; 
                posTarget = { x: 0, y: alturaCone / 2, z: 0 };
            }

            // Animação fluida de transição de câmera
            anime.remove(camera.position); anime.remove(controls.target);
            anime({
                targets: camera.position,
                x: posCam.x, y: posCam.y, z: posCam.z,
                duration: 1000,
                easing: 'easeInOutCubic',
                update: () => camera.lookAt(controls.target)
            });
            anime({
                targets: controls.target,
                x: posTarget.x, y: posTarget.y, z: posTarget.z,
                duration: 1000,
                easing: 'easeInOutCubic',
                complete: () => controls.update()
            });
        }

        function restaurarCenaPadrao() {
            document.querySelectorAll('.btn-foco').forEach(b => b.classList.remove('ativo'));
            
            // Restaura opacidades originais
            [linhaGeratriz, linhaRaio, linhaAltura].forEach(l => l.material.opacity = 1.0);
            grupoRotulos.children.forEach(m => m.material.opacity = 1.0);
            indicadorAngulo.material.opacity = 1.0;
            verticePonto.material.opacity = 1.0;
            coneMesh.material.opacity = 0.25;

            // Restaura texto padrão do painel
            const dadosPadrao = bancoDadosInfo.padrao;
            document.getElementById('titulo-painel').innerText = dadosPadrao.titulo;
            document.getElementById('titulo-painel').style.color = dadosPadrao.cor;
            document.getElementById('info-elemento').innerHTML = dadosPadrao.texto;

            // Retorna câmera para a perspectiva padrão inicial
            anime.remove(camera.position); anime.remove(controls.target);
            anime({
                targets: camera.position, x: 6, y: 4, z: 7,
                duration: 1000, easing: 'easeInOutCubic'
            });
            anime({
                targets: controls.target, x: 0, y: alturaCone / 2, z: 0,
                duration: 1000, easing: 'easeInOutCubic',
                complete: () => controls.update()
            });
        }

        function onWindowResize() { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
        }
        
        function animate() { 
            requestAnimationFrame(animate); 
            controls.update(); 
            
            // Faz com que os pequenos marcadores flutuantes sempre encarem a câmera de frente
            grupoRotulos.children.forEach(rotulo => {
                rotulo.quaternion.copy(camera.quaternion);
            });
            
            renderer.render(scene, camera); 
        }
    </script>
</body>
</html>
